<p>Doc-Scanner は、書類のスキャンと電子化を効率化するための Windows アプリです。</p>

<h3>概要</h3>

<ul>
  <li>ボタン一つで書類を電子化</li>
  <li>保存形式を選んで出力</li>
  <li>直感的に扱えるシンプルな UI</li>
</ul>
