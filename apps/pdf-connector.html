<p>PDF Connector は、複数の PDF ファイルを一つにまとめて扱うための Windows アプリです。</p>

<h3>概要</h3>

<ul>
  <li>複数の PDF を一つのファイルに統合</li>
  <li>シンプルな操作で PDF を管理</li>
  <li>高速に処理できる軽量ワークフロー</li>
</ul>
